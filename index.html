<body>

    <h2>User Directory</h2>
    
<!-- Search input -->
<input type="text" id="search" placeholder="Search by name or email..." />

 <label for="sort-name">Sort by name:</label>

</select>

<div id="loading">Loading...</div>

<div id="app">

    <h1>User Directory</h1>

    <h2>Create a New Post</h2>
